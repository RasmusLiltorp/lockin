name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile PDF
        run: typst compile main.typ "SE4-DMAD-compendium.pdf"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: SE4-DMAD compendium
          body: Latest compiled PDF (${{ github.sha }})
          files: SE4-DMAD-compendium.pdf
